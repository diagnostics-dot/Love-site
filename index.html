<html lang="ru">
<head>

    <title>Для тебя ❤️</title>

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;

            overflow: hidden;
        }

            color: #d6336c;

            padding: 0 20px;

        }
        .buttons-container {

            display: flex;
            justify-content: center;

            width: 100%;
            height: 60px;
        }

            font-size: 1.5rem;

            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

            background-color: #ff4b82;
            color: white;
            z-index: 2;
        }

        }
