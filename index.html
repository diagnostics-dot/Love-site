<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Фари ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #ffd1ff 0%, #fae8ff 50%, #fbc2eb 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        #header-container {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
        }

        h2 {
            color: #ff4b82;
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            margin-bottom: 0px;
            margin-top: 0;
            text-shadow: 1px 1px 4px rgba(255, 75, 130, 0.2);
        }

        h1 {
            color: #d81b60;
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            margin-top: 10px;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 8px rgba(216, 27, 96, 0.3);
            line-height: 1.1;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 60px;
            z-index: 10;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        #btn-yes {
            background: linear-gradient(45deg, #ff4b82, #ff758c);
            color: white;
            z-index: 15;
        }

        #btn-yes:active {
            transform: scale(0.95);
        }

        #btn-no {
            background-color: rgba(255, 255, 255, 0.9);
            color: #ff4b82;
            z-index: 15;
        }

        #success-message {
            display: none;
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: #d81b60;
            text-align: center;
            line-height: 1.2;
            padding: 0 20px;
            animation: fadeIn 1.5s;
            z-index: 10;
            text-shadow: 2px 2px 8px rgba(216, 27, 96, 0.3);
        }

        .gif-container {
            display: none;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 25px rgba(216, 27, 96, 0.4);
            z-index: 10;
            border: 4px solid white;
        }

        .heart {
            position: absolute;
            bottom: -20px;
            font-size: 1.5rem;
            color: rgba(255, 75, 130, 0.6);
            animation: floatUp 5s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="header-container">
        <h2>Вопрос Фари жанымке ✨</h2>
        <h1 id="question">Ты меня любишь? 🥺</h1>
    </div>
    
    <div class="buttons-container" id="btn-container">
        <button id="btn-yes">Да!</button>
        <button id="btn-no">Нет</button>
    </div>

    <div id="success-message">Я тоже тебя очень сильно люблю! ❤️</div>
    <div class="gif-container" id="gif-container">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExc29teWZ1ZXByM2U1Y2J4YWp5bWRqa3d0MDI1MzhyaXN3dHNqYXYwaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Vz58J8shFW6BvqnYTm/giphy.gif" alt="Love Hug" width="280">
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const hearts = ['❤️', '💖', '💕', '🌸', '✨'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        setInterval(createHeart, 300);

        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const headerContainer = document.getElementById('header-container');
        const btnContainer = document.getElementById('btn-container');
        const successMessage = document.getElementById('success-message');
        const gifContainer = document.getElementById('gif-container');

        function runAway() {
            btnNo.style.position = 'fixed';
            
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));

            btnNo.style.left = `${randomX}px`;
            btnNo.style.top = `${randomY}px`;
        }

        btnNo.addEventListener('mouseover', runAway);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            runAway();
        });

        btnYes.addEventListener('click', () => {
            headerContainer.style.display = 'none';
            btnContainer.style.display = 'none';
            successMessage.style.display = 'block';
            gifContainer.style.display = 'block';
            
            setInterval(createHeart, 100);
        });
    </script>

</body>
</html>
